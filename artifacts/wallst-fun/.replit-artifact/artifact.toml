kind = "web"
previewPath = "/"
title = "wallst.fun | Autonomous Memecoin Trading Agent"
version = "1.0.0"
id = "artifacts/wallst-fun"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23153

[services.development]
run = "pnpm --filter @workspace/wallst-fun run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/wallst-fun", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/wallst-fun", "run", "start"]

[services.production.run.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"

[services.env]
PORT = "23153"
BASE_PATH = "/"
